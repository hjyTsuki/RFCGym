# RFCGym Multi-Agent Protocol Vulnerability Hunting Configuration

system:
  name: "RFCGym Multi-Agent Protocol Fuzzer"
  version: "0.1"
  environment: "development"

paths:
  cve_tasks_dir: "./cve_tasks"          # Where individual scenario working dirs live
  logs_dir: "./logs"                    # Global orchestrator logs

# Orchestrator Settings
orchestrator:
  max_concurrent_cves: 5                # How many scenarios in parallel
  max_retries: 3
  max_feedback_depth: 3

# Agent Configuration
agents:
  # Agent prompt files (the .md files under agents/)
  prompts:
    protocol_analyzer: "protocol_analyzer.md"
    scenario_generator: "scenario_generator.md"
    scenario_builder: "scenario_builder.md"      # or "scenario_builder_with_proxy.md"
    attack_verifier: "attack_verifier.md"        # or "attack_verifier_with_proxy.md"
    env_finalizer: "env_finalizer.md"            # or "env_finalizer_with_proxy.md"
    poc_judger: "poc_judger.md"
    fuzzer: "fuzzer.md"
    known_attacker: "fuzzer.md"                  # placeholder; harness mostly scripted

  # Agent resource limits - prevents system overload
  limits:
    protocol_analyzer: 3
    scenario_generator: 3
    scenario_builder: 5
    attack_verifier: 10
    env_finalizer: 10
    poc_judger: 5
    fuzzer: 2                            # Runtime eval is resource-intensive
    known_attacker: 10

  # Agent timeouts (seconds)
  timeouts:
    protocol_analyzer: 3600              # Web research can be slow
    scenario_generator: 1200
    scenario_builder: 1800
    attack_verifier: 1800
    env_finalizer: 1800
    poc_judger: 1200
    fuzzer: 7200                         # 2h runtime budget by default
    known_attacker: 600

# Docker Configuration
docker:
  max_memory_per_container: "20G"
  max_cpu_per_container: 4
  cleanup_interval: 3600
  proxy:

# Logging Settings
logging:
  level: "INFO"
  verbose_claude_code: false
  save_conversations: true

# Model Configuration
models:
  default: "claude-opus-4-5-20251101"

  agent_models:
    protocol_analyzer: "claude-opus-4-5-20251101"
    scenario_generator: "claude-opus-4-5-20251101"
    scenario_builder: "claude-opus-4-5-20251101"
    attack_verifier: "claude-opus-4-5-20251101"
    env_finalizer: "claude-opus-4-5-20251101"
    poc_judger: "claude-opus-4-5-20251101"
    fuzzer: "claude-sonnet-4-5-20250929"     # the model under evaluation;
                                              # CLI --fuzzer-model overrides this
    known_attacker: "claude-haiku-4-5-20251001"

# === RFCGym protocol fuzzing specific ===
#
# SCOPE: RFCGym targets ONLY protocol-dependent bugs - i.e., bugs whose root
# cause is in the protocol's structure (spec ambiguity OR translation /
# composition boundary). Single-implementation bugs (memory corruption,
# integer overflow, isolated parser OOB) are explicitly OUT OF SCOPE - those
# belong in general fuzzing projects (AFL, libfuzzer), not here.
#
protocol_fuzzing:
  scenarios_dir: "../scenarios"

  bug_layers:
    L1:
      name: "spec_level_design_flaw"
      protocols_involved: 1
      bug_location: "RFC text itself"
      attack_method: "formal analysis / model checking / paper-style argument"
      description: |
        The protocol specification itself is ambiguous, contradictory, or
        admits unsafe trust patterns. Bug exists independently of any
        specific implementation - you can find it by reading the RFC alone.
      examples:
        - "CORS reflection / trust-boundary expansion (CVE-2018-20744)"
        - "TON ADNL key-agreement design"
        - "5G access-control formal-analysis gaps"

    L2:
      name: "cross_version_translation"
      protocols_involved: 1   # same protocol family
      bug_location: "translation boundary between protocol versions"
      attack_method: "differential testing of translation outputs"
      description: |
        Within one protocol family that has multiple versions (e.g. HTTP/1.1
        + HTTP/2 + HTTP/3), the spec is consistent at the semantic level but
        each version has different wire format. The bug lives at the
        translation layer that bridges versions.
      examples:
        - "H3Act: HTTP/3 -> HTTP/1.1 Range header translation"
        - "HDiff: HTTP/2 -> HTTP/1.1 frame -> message translation"
        - "Frameshifter: HTTP/2 -> HTTP/1 conversion anomalies"

    L3:
      name: "cross_vendor_variance"
      protocols_involved: 1   # same protocol + same version
      bug_location: "implementation interpretation of one spec"
      attack_method: "differential testing of vendor implementations"
      description: |
        Same protocol, same version. The spec has wiggle room or
        under-specified edge cases. Vendor implementations diverge in how
        they parse / serialize / route the same wire input. No translation
        layer required - just parallel-deploy multiple implementations and
        diff their outputs.
      examples:
        - "Kettle's HTTP/1.1 Request Smuggling (CL vs TE confusion)"
        - "T-Reqs / GUDIFU differential parsing studies"
        - "Nginx vs Envoy chunked-encoding disagreement"

    L4:
      name: "cross_protocol_composition"
      protocols_involved: ">=2"
      bug_location: "trust/composition gap between distinct protocols"
      attack_method: "trust chain analysis / identity decoupling"
      description: |
        Multiple distinct protocols stack or compose. Each protocol does its
        job correctly in isolation, but the system implicitly assumes their
        notion of a shared object (sender, host, path, length) refers to
        the same thing. Attacker decouples the objects across protocols.
      requires_trust_graph: true   # analyzer must produce trust_graph.yaml
      examples:
        - "Composition Kills (SPF Return-Path vs MUA From)"
        - "Inbox Invasion (MIME parser inconsistency across MTA/MUA)"
        - "TLS SNI vs HTTP Host (domain fronting / SNI bypass)"

    # Out of scope: single-implementation bugs (memory corruption, OOB, races)
    # that have no protocol-structural cause. Go to AFL/libfuzzer for those.

  attack_oracle:
    # All in-scope scenarios should reference at least one prior attack.
    # L1 may be theoretical (formal-analysis paper); we still want a reference.
    require_known_attack_for_l1: false
    require_known_attack_for_l2: true
    require_known_attack_for_l3: true
    require_known_attack_for_l4: true

  fuzz_runtime:
    # Reserved for the future evaluation pipeline. Not used during env construction.
    max_tests_per_ambiguity: 1000
    time_budget_seconds: 7200
    two_stage_mode: true
    hide_hints_from_fuzzer: true

  poc_judging:
    # Reserved for the future evaluation pipeline. Not used during env construction.
    oracle_mode:
      L1: llm_with_human_check     # formal-style argument; hard to mechanize
      L2: rule                     # wire diff
      L3: rule                     # wire diff
      L4: llm_with_human_check     # semantic trust-chain reasoning
    novelty_check:
      enabled: true
      cve_db_path: "./datasets/known_cves.jsonl"
      llm_judge_model: "claude-opus-4-5-20251101"
