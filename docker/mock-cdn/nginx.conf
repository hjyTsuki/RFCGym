user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format detailed escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"http_version":"$server_protocol",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"req_headers":{'
                '"host":"$host",'
                '"range":"$http_range",'
                '"if_match":"$http_if_match",'
                '"if_none_match":"$http_if_none_match",'
                '"if_modified_since":"$http_if_modified_since",'
                '"if_unmodified_since":"$http_if_unmodified_since",'
                '"if_range":"$http_if_range",'
                '"content_length":"$http_content_length",'
                '"transfer_encoding":"$http_transfer_encoding"'
            '},'
            '"quic":"$http3"'
        '}';

    access_log /var/log/nginx/access.log detailed;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=h3act_cache:10m max_size=512m inactive=10m use_temp_path=off;

    upstream origin_backend {
        server mock-origin:80;
        keepalive 16;
    }

    server {
        listen 443 quic reuseport;
        listen 443 ssl;
        http2 on;
        http3 on;

        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.3;
        ssl_early_data on;
        quic_retry on;

        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            default_type text/plain;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass_request_headers on;

            proxy_cache h3act_cache;
            proxy_cache_key "$scheme$host$request_uri";
            proxy_cache_valid 200 206 1m;
            proxy_cache_methods GET HEAD;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_request_buffering on;
            proxy_buffering on;

            proxy_pass http://origin_backend;
        }
    }
}
