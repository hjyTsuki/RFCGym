user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format origin_detailed escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"http_version":"$server_protocol",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"req_headers":{'
                '"host":"$http_host",'
                '"range":"$http_range",'
                '"if_match":"$http_if_match",'
                '"if_none_match":"$http_if_none_match",'
                '"if_modified_since":"$http_if_modified_since",'
                '"if_unmodified_since":"$http_if_unmodified_since",'
                '"if_range":"$http_if_range",'
                '"content_length":"$http_content_length",'
                '"transfer_encoding":"$http_transfer_encoding",'
                '"x_forwarded_for":"$http_x_forwarded_for",'
                '"x_forwarded_proto":"$http_x_forwarded_proto",'
                '"foo":"$http_foo",'
                '"user_agent":"$http_user_agent"'
            '}'
        '}';

    access_log /var/log/nginx/access.log origin_detailed;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            default_type text/plain;
        }

        location / {
            try_files $uri $uri/ =404;
            add_header Accept-Ranges bytes always;
        }
    }
}
